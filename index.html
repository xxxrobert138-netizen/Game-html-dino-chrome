<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon JS Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #555; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="score">Счет: 0</h1>
    </div>
    <div class="hint">Нажми ПРОБЕЛ или КЛИКНИ, чтобы прыгнуть</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameActive = true;
const particles = [];
const stars = Array.from({length: 100}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 2 + 0.5
}));

const player = {
    x: 100, y: 0, w: 40, h: 40,
    dy: 0, jumpForce: 16, gravity: 0.8,
    grounded: false, color: '#00f2ff',
    angle: 0 // Для анимации вращения
};

const obstacles = [];
let spawnTimer = 0;

function createParticle(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({
            x, y, 
            dx: (Math.random() - 0.5) * 10,
            dy: (Math.random() - 0.5) * 10,
            life: 1.0,
            color
        });
    }
}

function update() {
    if (!gameActive) return;

    // Гравитация и вращение
    player.dy += player.gravity;
    player.y += player.dy;
    if (!player.grounded) player.angle += 0.15;
    else player.angle = 0;

    const groundLevel = canvas.height - 100;
    if (player.y + player.h > groundLevel) {
        player.y = groundLevel - player.h;
        player.dy = 0;
        player.grounded = true;
    }

    // Звезды (фон)
    stars.forEach(s => {
        s.x -= s.speed;
        if (s.x < 0) s.x = canvas.width;
    });

    // Препятствия
    spawnTimer++;
    if (spawnTimer > Math.max(35, 90 - score)) {
        const size = Math.random() * 40 + 20;
        obstacles.push({ x: canvas.width, y: groundLevel - size, w: size, h: size, speed: 9 + (score/10) });
        spawnTimer = 0;
    }

    obstacles.forEach((obs, i) => {
        obs.x -= obs.speed;
        if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
            player.y < obs.y + obs.h && player.y + player.h > obs.y) gameOver();
        if (obs.x + obs.w < 0) { obstacles.splice(i, 1); score++; scoreElement.innerText = `Счет: ${score}`; }
    });

    // Частицы
    particles.forEach((p, i) => {
        p.x += p.dx; p.y += p.dy; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем звезды
    ctx.fillStyle = '#fff';
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

    // Пол
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 100);
    ctx.lineTo(canvas.width, canvas.height - 100);
    ctx.stroke();

    // Частицы
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;

    // Игрок (с вращением)
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    ctx.rotate(player.angle);
    ctx.shadowBlur = 20;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    ctx.restore();

    // Враги
    ctx.shadowColor = '#ff0055';
    ctx.fillStyle = '#ff0055';
    obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));
    ctx.shadowBlur = 0;
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function gameOver() {
    gameActive = false;
    createParticle(player.x, player.y, '#ff0055');
    setTimeout(() => {
        alert(`GAME OVER! Счет: ${score}`);
        location.reload();
    }, 100);
}

const jumpAction = () => {
    if (player.grounded && gameActive) {
        player.dy = -player.jumpForce;
        player.grounded = false;
        createParticle(player.x, player.y + player.h, player.color);
    }
};

window.addEventListener('keydown', (e) => { if (e.code === 'Space') jumpAction(); });
window.addEventListener('mousedown', jumpAction);
loop();
</script>
</body>
</html>
