<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon JS Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #555; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="score">Счет: 0</h1>
    </div>
    <div class="hint">Нажми ПРОБЕЛ или КЛИКНИ, чтобы прыгнуть</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameActive = true;
let gameHue = 200; // Для динамического цвета фона

const particles = [];
const bullets = [];
const obstacles = [];
let spawnTimer = 0;

const player = {
    x: 100, y: 0, w: 45, h: 45,
    dy: 0, jumpForce: 14, gravity: 0.7,
    jumps: 0, maxJumps: 2, // Двойной прыжок
    color: '#00f2ff',
    angle: 0
};

function createParticle(x, y, color, count = 10) {
    for(let i=0; i<count; i++) {
        particles.push({
            x, y, 
            dx: (Math.random() - 0.5) * 12,
            dy: (Math.random() - 0.5) * 12,
            life: 1.0,
            color
        });
    }
}

function update() {
    if (!gameActive) return;

    gameHue += 0.1; // Плавная смена цвета мира
    
    // Физика игрока
    player.dy += player.gravity;
    player.y += player.dy;
    if (!player.grounded) player.angle += 0.2;

    const groundLevel = canvas.height - 100;
    if (player.y + player.h > groundLevel) {
        player.y = groundLevel - player.h;
        player.dy = 0;
        player.grounded = true;
        player.jumps = 0;
        player.angle = 0;
    }

    // Пули
    bullets.forEach((b, bi) => {
        b.x += 15;
        if (b.x > canvas.width) bullets.splice(bi, 1);
        
        // Попадание во врага
        obstacles.forEach((obs, oi) => {
            if (b.x < obs.x + obs.w && b.x + 10 > obs.x && b.y < obs.y + obs.h && b.y + 10 > obs.y) {
                createParticle(obs.x, obs.y, '#ff0055', 15);
                obstacles.splice(oi, 1);
                bullets.splice(bi, 1);
                score += 2;
                scoreElement.innerText = `Счет: ${score} (BOOM!)`;
            }
        });
    });

    // Препятствия (теперь разной высоты)
    spawnTimer++;
    if (spawnTimer > Math.max(30, 80 - score/2)) {
        const h = Math.random() * 60 + 20;
        const isAir = Math.random() > 0.8; // Летающие враги
        obstacles.push({
            x: canvas.width,
            y: isAir ? groundLevel - h - 80 : groundLevel - h,
            w: 40, h: h,
            speed: 10 + (score/15)
        });
        spawnTimer = 0;
    }

    obstacles.forEach((obs, i) => {
        obs.x -= obs.speed;
        // Коллизия с игроком
        if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
            player.y < obs.y + obs.h && player.y + player.h > obs.y) gameOver();
        if (obs.x + obs.w < 0) { obstacles.splice(i, 1); score++; scoreElement.innerText = `Счет: ${score}`; }
    });

    particles.forEach((p, i) => {
        p.x += p.dx; p.y += p.dy; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    // Градиентный фон
    ctx.fillStyle = `hsl(${gameHue % 360}, 30%, 5%)`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем «энергетический» пол
    ctx.shadowBlur = 15;
    ctx.shadowColor = `hsl(${gameHue % 360}, 100%, 50%)`;
    ctx.strokeStyle = `hsl(${gameHue % 360}, 100%, 50%)`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 100);
    ctx.lineTo(canvas.width, canvas.height - 100);
    ctx.stroke();

    // Пули
    ctx.fillStyle = '#fff';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 15, 5));

    // Частицы
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Игрок
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    ctx.rotate(player.angle);
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    // Глаза игрока (детализация)
    ctx.fillStyle = 'black';
    ctx.fillRect(10, -15, 5, 10); 
    ctx.restore();

    // Враги
    obstacles.forEach(obs => {
        ctx.shadowColor = '#ff0055';
        ctx.fillStyle = '#ff0055';
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    });
    ctx.shadowBlur = 0;
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function gameOver() {
    gameActive = false;
    createParticle(player.x, player.y, '#ff0055', 40);
    setTimeout(() => { alert(`ТВОЙ РЕЗУЛЬТАТ: ${score}`); location.reload(); }, 200);
}

// Управление
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
        if (player.jumps < player.maxJumps) {
            player.dy = -player.jumpForce;
            player.jumps++;
            player.grounded = false;
            createParticle(player.x, player.y + player.h, player.color);
        }
    }
    if (e.code === 'KeyF' || e.code === 'Enter') {
        bullets.push({ x: player.x + player.w, y: player.y + player.h/2, speed: 15 });
        // Отдача от выстрела
        player.x -= 5; 
        setTimeout(() => player.x += 5, 50);
    }
});

loop();
</script>
</body>
</html>
