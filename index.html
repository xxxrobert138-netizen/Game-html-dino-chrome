<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER OVERDRIVE: BOSS EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            text-shadow: 0 0 10px #00f2ff; pointer-events: none;
        }
        .combo { font-size: 40px; color: #ff0055; opacity: 0; transition: 0.2s; }
        #boss-ui { 
            position: absolute; top: 20px; right: 20px; width: 300px; 
            display: none; text-align: right; 
        }
        .hp-bg { width: 100%; height: 10px; background: #300; border: 1px solid #ff0055; }
        #hp-fill { width: 100%; height: 100%; background: #ff0055; transition: 0.1s; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px;">SCORE: <span id="score">0</span></div>
        <div id="combo-text" class="combo">COMBO X2</div>
    </div>
    <div id="boss-ui">
        <div style="color: #ff0055; margin-bottom: 5px;">THE SENTINEL</div>
        <div class="hp-bg"><div id="hp-fill"></div></div>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo-text');
const bossUi = document.getElementById('boss-ui');
const hpFill = document.getElementById('hp-fill');

let w, h, score = 0, gameActive = true, frame = 0, shake = 0, combo = 0, comboTimer = 0;
let boss = null;

const player = { x: 150, y: 0, w: 40, h: 40, dy: 0, jumps: 0, dashCd: 0, dashing: 0 };
const objs = { obs: [], drones: [], bullets: [], parts: [], bossBullets: [] };

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function spawnPart(x, y, color, count=10) {
    for(let i=0; i<count; i++) 
        objs.parts.push({x, y, dx:(Math.random()-0.5)*15, dy:(Math.random()-0.5)*15, life:1, color});
}

function update() {
    if(!gameActive) return;
    frame++;
    if(comboTimer > 0) { comboTimer--; } else { combo = 0; comboEl.style.opacity = 0; }

    // Физика игрока
    player.dy += 0.7; player.y += player.dy;
    if(player.dashCd > 0) player.dashCd--;
    if(player.dashing > 0) player.dashing--;
    const ground = h - 100;
    if(player.y + player.h > ground) { player.y = ground - player.h; player.dy = 0; player.jumps = 0; }

    // Логика босса
    if(score >= 50 && !boss && score % 100 < 10) {
        boss = { x: w + 100, y: ground - 200, w: 100, h: 100, hp: 100, maxHp: 100, dir: 1 };
        bossUi.style.display = 'block';
    }

    if(boss) {
        boss.x = Math.max(w - 200, boss.x - 2);
        boss.y += boss.dir * 2;
        if(boss.y > ground - 120 || boss.y < 50) boss.dir *= -1;
        if(frame % 60 === 0) objs.bossBullets.push({x: boss.x, y: boss.y + 50, dx: -10});
        
        if(boss.hp <= 0) {
            spawnPart(boss.x + 50, boss.y + 50, '#ff0055', 100);
            boss = null; bossUi.style.display = 'none'; score += 50; shake = 30;
        }
    }

    // Пули и коллизии
    objs.bullets.forEach((b, i) => {
        b.x += 25;
        if(boss && b.x > boss.x && b.y > boss.y && b.y < boss.y + boss.h) {
            boss.hp -= 5; hpFill.style.width = (boss.hp/boss.maxHp)*100 + '%';
            objs.bullets.splice(i, 1); spawnPart(b.x, b.y, '#fff', 5); shake = 5;
        }
    });

    objs.bossBullets.forEach((bb, i) => {
        bb.x += bb.dx;
        if(player.x < bb.x + 10 && player.x + player.w > bb.x && player.y < bb.y + 10 && player.y + player.h > bb.y) {
            if(player.dashing === 0) gameOver();
        }
    });

    // Обычные враги (не спавним, пока жив босс)
    if(!boss) {
        if(frame % 80 === 0) objs.obs.push({x:w, y:ground-50, w:30, h:50, speed: 10 + score/10});
        if(frame % 150 === 0) objs.drones.push({x:w, baseY:ground-180, w:35, h:20, phase:0});
    }

    [...objs.obs, ...objs.drones].forEach((obj, i, arr) => {
        obj.x -= (obj.speed || 8);
        if(obj.phase !== undefined) { obj.phase += 0.05; obj.y = obj.baseY + Math.sin(obj.phase)*60; }
        if(player.x < obj.x + 30 && player.x + 40 > obj.x && player.y < obj.y + 30 && player.y + 40 > obj.y) {
            if(player.dashing > 0) {
                arr.splice(i, 1); combo++; comboTimer = 60; score += 5 * combo;
                comboEl.innerText = `COMBO X${combo}`; comboEl.style.opacity = 1;
                spawnPart(obj.x, obj.y, 'yellow');
            } else gameOver();
        }
        objs.bullets.forEach((b, bi) => {
            if(b.x > obj.x && b.x < obj.x+40 && b.y > obj.y && b.y < obj.y+40) {
                arr.splice(i, 1); objs.bullets.splice(bi, 1);
                score += 2; spawnPart(obj.x, obj.y, '#00f2ff');
            }
        });
    });

    objs.parts.forEach((p, i) => { p.x += p.dx; p.y += p.dy; p.life -= 0.02; if(p.life <= 0) objs.parts.splice(i, 1); });
    scoreEl.innerText = score;
}

function draw() {
    ctx.save();
    if(shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake--; }
    
    // Эффект Warp при рывке
    ctx.fillStyle = player.dashing > 0 ? '#001122' : '#000';
    ctx.fillRect(0, 0, w, h);

    // Сетка
    ctx.strokeStyle = '#111';
    for(let i=0; i<w; i+=100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }

    // Босс
    if(boss) {
        ctx.shadowBlur = 30; ctx.shadowColor = 'red';
        ctx.fillStyle = '#ff0055';
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = '#fff'; ctx.fillRect(boss.x + 20, boss.y + 20, 20, 20); // Глаз
    }

    // Враги и пули
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff0'; objs.drones.forEach(d => ctx.fillRect(d.x, d.y, d.w, d.h));
    ctx.fillStyle = '#ff0055'; objs.obs.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
    ctx.fillStyle = '#fff'; objs.bullets.forEach(b => ctx.fillRect(b.x, b.y, 20, 4));
    ctx.fillStyle = '#ff0055'; objs.bossBullets.forEach(bb => ctx.fillRect(bb.x, bb.y, 10, 10));

    // Игрок
    ctx.shadowColor = '#00f2ff';
    ctx.fillStyle = player.dashing > 0 ? '#fff' : '#00f2ff';
    if(player.dashing > 0) ctx.fillRect(player.x - 50, player.y, 100, player.h); // Шлейф
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // Частицы
    ctx.shadowBlur = 0;
    objs.parts.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
    
    ctx.restore();
    if(gameActive) requestAnimationFrame(draw);
    update();
}

function gameOver() {
    gameActive = false; spawnPart(player.x, player.y, '#ff0055', 50);
    setTimeout(() => { if(confirm("FINAL SCORE: " + score + ". AGANE?")) location.reload(); }, 200);
}

window.addEventListener('keydown', e => {
    if(e.code === 'Space' && player.jumps < 2) { player.dy = -15; player.jumps++; spawnPart(player.x+20, player.y+40, '#fff', 5); }
    if(e.code === 'KeyF') objs.bullets.push({x:player.x+40, y:player.y+15});
    if(e.code === 'ShiftLeft' && player.dashCd === 0) { player.dashing = 20; player.dashCd = 60; shake = 10; }
});

draw();
</script>
</body>
</html>
