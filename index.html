<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Cyber Parkour</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #stats { position: absolute; top: 20px; left: 20px; color: #00f2ff; font-size: 24px; text-shadow: 0 0 10px #00f2ff; pointer-events: none; }
        .controls { position: absolute; bottom: 10px; left: 10px; color: #444; font-size: 12px; }
    </style>
</head>
<body>
    <div id="stats">SCORE: 0</div>
    <div class="controls">SPACE: JUMP (x2) | F: SHOOT | SHIFT: DASH</div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('stats');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameActive = true;
let frameCount = 0;
let shakeTime = 0;

// Массивы объектов
const particles = [];
const bullets = [];
const obstacles = [];
const drones = []; // Те самые "птицы"

const player = {
    x: 100, y: 0, w: 40, h: 40,
    dy: 0, jumpForce: 15, gravity: 0.7,
    jumps: 0, maxJumps: 2,
    dashCooldown: 0,
    isDashing: 0,
    color: '#00f2ff'
};

function createParticle(x, y, color, count = 8, speed = 5) {
    for(let i=0; i<count; i++) {
        particles.push({
            x, y, 
            dx: (Math.random() - 0.5) * speed,
            dy: (Math.random() - 0.5) * speed,
            life: 1.0,
            color
        });
    }
}

function update() {
    if (!gameActive) return;
    frameCount++;

    // Тряска камеры
    if (shakeTime > 0) shakeTime--;

    // Регенерация рывка
    if (player.dashCooldown > 0) player.dashCooldown--;
    if (player.isDashing > 0) {
        player.isDashing--;
        createParticle(player.x, player.y + player.h/2, player.color, 2, 2);
    }

    // Физика игрока
    player.dy += player.gravity;
    player.y += player.dy;
    
    const ground = canvas.height - 100;
    if (player.y + player.h > ground) {
        player.y = ground - player.h;
        player.dy = 0;
        player.jumps = 0;
    }

    // Логика пуль
    bullets.forEach((b, i) => {
        b.x += 20;
        if (b.x > canvas.width) bullets.splice(i, 1);
    });

    // Логика наземных препятствий
    if (frameCount % 100 === 0) {
        obstacles.push({ x: canvas.width, y: ground - 50, w: 30, h: 50, speed: 8 + score/10 });
    }

    // Логика ДРОНОВ (Птиц)
    if (frameCount % 160 === 0) {
        drones.push({
            x: canvas.width,
            baseY: ground - 150 - Math.random() * 100,
            y: 0,
            w: 30, h: 20,
            phase: 0,
            speed: 6 + score/12
        });
    }

    drones.forEach((d, i) => {
        d.x -= d.speed;
        d.phase += 0.05;
        d.y = d.baseY + Math.sin(d.phase) * 50; // Движение волной

        // Проверка столкновения с пулей
        bullets.forEach((b, bi) => {
            if (b.x < d.x + d.w && b.x + 15 > d.x && b.y < d.y + d.h && b.y + 5 > d.y) {
                createParticle(d.x, d.y, '#ffff00', 20, 10);
                drones.splice(i, 1);
                bullets.splice(bi, 1);
                score += 5;
                shakeTime = 10;
            }
        });

        if (player.x < d.x + d.w && player.x + player.w > d.x && player.y < d.y + d.h && player.y + player.h > d.y) {
            if (player.isDashing > 0) { // Если летим рывком - ломаем дрон
                createParticle(d.x, d.y, '#ffff00', 20);
                drones.splice(i, 1);
                score += 5;
            } else {
                gameOver();
            }
        }
    });

    obstacles.forEach((obs, i) => {
        obs.x -= obs.speed;
        if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y < obs.y + obs.h && player.y + player.h > obs.y) {
            if (player.isDashing == 0) gameOver();
        }
        if (obs.x + obs.w < 0) { obstacles.splice(i, 1); score++; }
    });

    particles.forEach((p, i) => {
        p.x += p.dx; p.y += p.dy; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    });

    scoreDisplay.innerText = `SCORE: ${score} ${player.dashCooldown === 0 ? ' | DASH READY' : ''}`;
}

function draw() {
    ctx.save();
    if (shakeTime > 0) ctx.translate(Math.random()*10 - 5, Math.random()*10 - 5);

    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка на фоне
    ctx.strokeStyle = '#111';
    for(let i=0; i<canvas.width; i+=50) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }

    // Пол
    ctx.strokeStyle = player.color;
    ctx.lineWidth = 3;
    ctx.strokeRect(-10, canvas.height - 100, canvas.width + 20, 100);

    // Пули
    ctx.fillStyle = '#fff';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 15, 5));

    // Дроны
    drones.forEach(d => {
        ctx.fillStyle = '#ffff00';
        ctx.shadowBlur = 15; ctx.shadowColor = 'yellow';
        ctx.fillRect(d.x, d.y, d.w, d.h);
        ctx.fillRect(d.x - 5, d.y + 5, 5, 5); // Детали дрона
        ctx.fillRect(d.x + d.w, d.y + 5, 5, 5);
    });

    // Препятствия
    ctx.fillStyle = '#ff0055';
    ctx.shadowColor = '#ff0055';
    obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));

    // Игрок
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.isDashing > 0 ? '#fff' : player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // Частицы
    ctx.shadowBlur = 0;
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;
    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function gameOver() {
    gameActive = false;
    createParticle(player.x, player.y, '#ff0055', 50, 15);
    setTimeout(() => { alert("GAME OVER! SCORE: " + score); location.reload(); }, 200);
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        if (player.jumps < player.maxJumps) {
            player.dy = -player.jumpForce;
            player.jumps++;
            createParticle(player.x + 20, player.y + 40, '#fff');
        }
    }
    if (e.code === 'KeyF') {
        bullets.push({ x: player.x + 40, y: player.y + 15 });
    }
    if (e.code === 'ShiftLeft' && player.dashCooldown === 0) {
        player.isDashing = 15;
        player.dashCooldown = 60;
        createParticle(player.x, player.y + 20, player.color, 20, 10);
    }
});

loop();
</script>
</body>
</html>
